[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# Redirect www → apex
[[redirects]]
  from   = "https://www.your-domain.netlify.app/*"
  to     = "https://your-domain.netlify.app/:splat"
  status = 301
  force  = true

# SPA-style 404 fallback (Astro handles 404.astro but this is a safety net)
[[redirects]]
  from   = "/*"
  to     = "/404"
  status = 404

[dev]
  command = "npm run dev"
  port    = 4321
